<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 11 Clone</title>
  <link rel="stylesheet" href="style.css">
  <style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:url("https://wallpaperaccess.com/full/7487484.jpg");
    background-size:cover;
    background-position:center;
}

/* Desktop Icons */

.desktop-icons{
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.icon{
    width:80px;
    text-align:center;
    color:white;
    cursor:pointer;
}

.icon img{
    width:55px;
}

.icon p{
    margin-top:5px;
    font-size:14px;
}

/* Taskbar */

.taskbar{
    position:fixed;
    bottom:0;
    width:100%;
    height:65px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 20px;
}

.task-icons{
    display:flex;
    gap:18px;
}

.task-icons img{
    width:38px;
    cursor:pointer;
    transition:0.3s;
}

.task-icons img:hover{
    transform:translateY(-5px);
}

/* Clock */

.clock{
    position:absolute;
    right:20px;
    color:white;
    font-size:14px;
}

/* Start Menu */

.start-menu{
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(25px);
    border-radius:25px;
    padding:25px;
    color:white;
}

.start-menu h2{
    margin-bottom:20px;
}

.apps{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.app{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
}

.app:hover{
    background:rgba(255,255,255,0.25);
}
</style>
</head>
<body>

  <!-- Desktop Icons -->
  <div class="desktop-icons">
    <div class="icon">
      <img src="https://img.icons8.com/color/96/recycle-bin.png">
      <p>Recycle Bin</p>
    </div>

    <div class="icon">
      <img src="https://img.icons8.com/color/96/google-chrome.png">
      <p>Chrome</p>
    </div>
  </div>

  <!-- Start Menu -->
  <div class="start-menu">
    <h2>Start</h2>

    <div class="apps">
      <div class="app">Edge</div>
      <div class="app">Store</div>
      <div class="app">Photos</div>
      <div class="app">Settings</div>
    </div>
  </div>

  <!-- Taskbar -->
  <div class="taskbar">

    <div class="task-icons">
      <img src="https://img.icons8.com/color/48/windows-11.png">
      <img src="https://img.icons8.com/color/48/folder-invoices.png">
      <img src="https://img.icons8.com/color/48/google-chrome.png">
      <img src="https://img.icons8.com/color/48/microsoft-store.png">
    </div>

    <div class="clock">
      10:45 PM
    </div>

  </div>

</body>
</html>
